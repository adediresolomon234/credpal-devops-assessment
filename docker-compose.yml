version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: credpal-node-app:local
    container_name: credpal_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-credpal}
      DB_USER: ${DB_USER:-credpal_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credpal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: credpal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-credpal}
      POSTGRES_USER: ${DB_USER:-credpal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - credpal_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-credpal_user} -d ${DB_NAME:-credpal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  credpal_net:
    driver: bridge
